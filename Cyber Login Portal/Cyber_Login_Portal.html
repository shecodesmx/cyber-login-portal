<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Login Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="grid-background"></div>
    <div class="scanlines"></div>
    <div class="background-circles">
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
    </div>
    <div class="orbit-container">
        <div class="orbit orbit-1"></div>
        <div class="orbit orbit-2"></div>
    </div>
    <div class="particles-container">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    <div class="lines-container">
        <div class="connection-line line-1"></div>
        <div class="connection-line line-2"></div>
        <div class="connection-line line-3"></div>
        <div class="connection-line line-4"></div>
    </div>
    <div class="glow-dot"></div>
    <div class="glow-dot"></div>
    <div class="glow-dot"></div>
    <div class="glow-dot"></div>
    <div class="glow-dot"></div>
    <div class="glow-dot"></div>
    <div class="status-indicator">
        <div class="status-dot"></div>
        <div class="status-text">System Online</div>
    </div>
    <div class="audio-bars">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>
    <div class="version">1.2</div>
    <div class="login-container">
        <div class="rotating-ring"></div>
        <div class="center-gauge"></div>
        <div class="corner-decoration corner-top-left"></div>
        <div class="corner-decoration corner-top-right"></div>
        <div class="corner-decoration corner-bottom-left"></div>
        <div class="corner-decoration corner-bottom-right"></div>
        <div class="login-title">
            <h1 class="title-main">Cyber Portal</h1>
            <p class="title-sub">Access Granted • Secure Login</p>
            <div class="progress-bar-container">
                <div class="progress-bar"></div>
            </div>
        </div>
        <form class="login-form" id="loginForm">
            <div class="input-wrapper">
                <div class="input-icon"></div>
                <input type="text" class="input-field" id="username" placeholder="Username" autocomplete="username">
            </div>
            <div class="input-wrapper">
                <div class="input-icon"></div>
                <input type="password" class="input-field" id="password" placeholder="Password" autocomplete="current-password">
            </div>
            <label class="remember-wrapper">
                <input type="checkbox" id="remember">
                <div class="custom-checkbox"></div>
                <span class="remember-label">Remember Me</span>
            </label>
            <button type="submit" class="login-button">
                <span class="button-text">Login</span>
            </button>
            <div class="login-links">
                <a href="#" class="login-link">Forgot Password?</a>
                <a href="Register.html" class="login-link">Create Account</a>
            </div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
