<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Register Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="grid-background"></div>
    <div class="scanlines"></div>
    <div class="background-circles">
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
    </div>
    <div class="orbit-container">
        <div class="orbit orbit-1"></div>
        <div class="orbit orbit-2"></div>
    </div>
    <div class="particles-container">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    <div class="lines-container">
        <div class="connection-line line-1"></div>
        <div class="connection-line line-2"></div>
        <div class="connection-line line-3"></div>
        <div class="connection-line line-4"></div>
    </div>
    <div class="glow-dot"></div>
    <div class="glow-dot"></div>
    <div class="glow-dot"></div>
    <div class="glow-dot"></div>
    <div class="glow-dot"></div>
    <div class="glow-dot"></div>
    <div class="status-indicator">
        <div class="status-dot"></div>
        <div class="status-text">System Online</div>
    </div>
    <div class="audio-bars">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>
    <div class="version">1.2</div>
    <div class="login-container">
        <div class="rotating-ring"></div>
        <div class="center-gauge"></div>
        <div class="corner-decoration corner-top-left"></div>
        <div class="corner-decoration corner-top-right"></div>
        <div class="corner-decoration corner-bottom-left"></div>
        <div class="corner-decoration corner-bottom-right"></div>
        <div class="login-title">
            <h1 class="title-main">Register</h1>
            <p class="title-sub">Create New Account • Join Us</p>
            <div class="progress-bar-container">
                <div class="progress-bar"></div>
            </div>
        </div>
        <form class="login-form" id="registerForm">
            <div class="input-row">
                <div class="input-wrapper">
                    <div class="input-icon"></div>
                    <input type="text" class="input-field" id="firstName" placeholder="First Name" autocomplete="given-name">
                </div>
                <div class="input-wrapper">
                    <div class="input-icon"></div>
                    <input type="text" class="input-field" id="lastName" placeholder="Last Name" autocomplete="family-name">
                </div>
            </div>
            <div class="input-wrapper">
                <div class="input-icon"></div>
                <input type="email" class="input-field" id="email" placeholder="Email Address" autocomplete="email">
            </div>
            <div class="input-wrapper">
                <div class="input-icon"></div>
                <input type="text" class="input-field" id="username" placeholder="Username" autocomplete="username">
            </div>
            <div class="input-wrapper">
                <div class="input-icon"></div>
                <input type="password" class="input-field" id="password" placeholder="Password" autocomplete="new-password">
            </div>
            <div class="input-wrapper">
                <div class="input-icon"></div>
                <input type="password" class="input-field" id="confirmPassword" placeholder="Confirm Password" autocomplete="new-password">
            </div>
            <label class="remember-wrapper">
                <input type="checkbox" id="terms">
                <div class="custom-checkbox"></div>
                <span class="remember-label">I accept Terms & Conditions</span>
            </label>
            <button type="submit" class="login-button">
                <span class="button-text">Register</span>
            </button>
            <div class="or-divider">
                <span class="or-text">or</span>
            </div>
            <div class="login-links" style="justify-content: center;">
                <a href="Cyber_Login_Portal.html" class="login-link">Already have an account? Login</a>
            </div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
